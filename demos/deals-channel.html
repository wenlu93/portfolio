<style>/* ============================================================
   OTA 营销频道页 Demo — 设计令牌系统
   挂在 [data-identity][data-tier] 上，切人群=改两个属性，全页换肤
   ============================================================ */

/* ---------- 通用语义令牌（与皮肤无关） ---------- */
:root{
  --sp-1:4px;  --sp-2:6px;  --sp-3:10px; --sp-4:14px;
  --sp-5:16px; --sp-6:20px; --sp-8:26px; --sp-10:32px;
  --fs-display:21px; --fs-h1:15px; --fs-h2:13.5px;
  --fs-body:13px; --fs-cap:11px; --fs-price:18px;
  --lh-tight:1.2; --lh-base:1.5;
  --t-fast:150ms; --t-base:240ms; --t-slow:420ms;
  --ease:cubic-bezier(.22,1,.36,1);
  --z-nav:100; --z-tab:90; --z-aibar:200; --z-sheet:300; --z-toast:400; --z-console:500;
  --serif: "Songti SC","Noto Serif SC","Source Han Serif SC",serif;
  --sans: "PingFang SC","Noto Sans SC","Source Han Sans SC","Hiragino Sans GB",system-ui,sans-serif;
  /* 价格与积分令牌（各皮肤可独立覆盖） */
  --price-color: var(--brand);
  --coin-color: #9A7200;
  --coin-bg: #FFF4D6;
  --promo-bg: var(--brand-soft);
}

/* ============================================================
   性价比档 (tier=value) — 各身份本色
   ============================================================ */

/* 个人 solo · 质感玫瑰 */
[data-identity="solo"][data-tier="value"]{
  --brand:#C04468; --brand-strong:#96304E; --brand-soft:#F4DDE6; --accent:#CB6C36;
  --bg:#FAF6F8; --surface:#FFFFFF; --surface-2:#F1E8ED;
  --text:#1A1215; --text-muted:#6A6270;
  --hairline:#E6D8DE; --radius:14px;
  --shadow:0 1px 4px rgba(150,48,78,.06), 0 6px 18px rgba(192,68,104,.08);
  --font-title:var(--sans); --title-weight:800;
  /* solo·value 专属：蓝色价格 + 金色积分 + 粉紫渐变促销底 */
  --price-color: #1A6FDB;
  --coin-color: #A07400;
  --coin-bg: #FFF0C8;
  --promo-bg: linear-gradient(140deg, #FDE4EE 0%, #EAE4FF 100%);
}

/* 亲子 family · 质感暖金 */
[data-identity="family"][data-tier="value"]{
  --brand:#C08030; --brand-strong:#9A6420; --brand-soft:#FEF2DC; --accent:#199488;
  --bg:#FFFDFB; --surface:#FFFFFF; --surface-2:#FAF5EC;
  --text:#201C10; --text-muted:#706858;
  --hairline:#EDE4D0; --radius:18px;
  --shadow:0 1px 4px rgba(152,96,20,.04), 0 6px 18px rgba(192,128,48,.07);
  --font-title:var(--sans); --title-weight:800;
  /* family·value 专属：蓝色价格 + 金色积分 + 浅暖金促销底 */
  --price-color: #1A6FDB;
  --coin-color: #9A7200;
  --coin-bg: #FFF4D6;
  --promo-bg: linear-gradient(140deg, #FEF0D0 0%, #FFFAEE 100%);
}

/* 商旅 biz · 质感深蓝 */
[data-identity="biz"][data-tier="value"]{
  --brand:#1645A0; --brand-strong:#0E2C68; --brand-soft:#D5E2F4; --accent:#2A8AB0;
  --bg:#F2F5FC; --surface:#FFFFFF; --surface-2:#E6EEF8;
  --text:#0E1828; --text-muted:#526178;
  --hairline:#D2DCF0; --radius:12px;
  --shadow:0 1px 4px rgba(14,44,104,.04), 0 6px 18px rgba(22,69,160,.08);
  --font-title:var(--sans); --title-weight:700;
}

/* 展演 event · 深夜剧场 */
[data-identity="event"][data-tier="value"]{
  --brand:#6638B8; --brand-strong:#4A2896; --brand-soft:#1E1438; --accent:#BC347C;
  --accent-2:#16BAC8;
  --bg:#0C0818; --surface:#17122A; --surface-2:#1E1836;
  --text:#EEE8F6; --text-muted:#9E90BA;
  --hairline:#2C2248; --radius:14px;
  --shadow:0 3px 10px rgba(0,0,0,.5), 0 10px 26px rgba(102,56,184,.2);
  --font-title:var(--sans); --title-weight:800;
  --neon:0 0 10px rgba(188,52,124,.38);
}

/* ============================================================
   高端档黑金皮肤 (tier=premium)
   ============================================================ */
[data-tier="premium"]{
  --bg:#090909; --surface:#131110; --surface-2:#1B1914;
  --brand:#A48C2C; --brand-strong:#86721C; --brand-soft:#1C1806;
  --text:#EEE8D4; --text-muted:#968E74; --hairline:#2A2618;
  --radius:12px;
  --shadow:0 2px 8px rgba(0,0,0,.5), 0 12px 30px rgba(0,0,0,.55);
  --gold-glow:0 0 0 1px rgba(164,140,44,.26);
  --font-title:var(--serif); --title-weight:600;
}
[data-identity="solo"][data-tier="premium"]   { --accent:#D09AA8; }
[data-identity="family"][data-tier="premium"] { --accent:#D8B868; }
[data-identity="biz"][data-tier="premium"]    { --accent:#84A8CC; }
[data-identity="event"][data-tier="premium"]  { --accent:#AC7ED0; }

/* ============================================================
   基础排版与重置
   ============================================================ */
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  font-family:var(--sans);
  background:#2c2c30;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
img{ display:block; max-width:100%; }

#channel{
  background:var(--bg);
  color:var(--text);
  transition: background-color var(--t-slow) var(--ease), color var(--t-slow) var(--ease);
  font-family:var(--sans);
  min-height:100%;
}

/* ---------- 楼层动画 ---------- */
.floor{ opacity:1; transition: opacity var(--t-base) var(--ease); }
.floor-enter{ animation: floorIn var(--t-slow) var(--ease); }
@keyframes floorIn{
  0%  { transform:translateY(10px); opacity:.5; }
  100%{ transform:translateY(0);    opacity:1;  }
}

/* ---------- 楼层标题 — 收紧间距 ---------- */
.floor-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--sp-4); margin: var(--sp-3) 0 var(--sp-2);
}
.floor-title{
  font-family:var(--font-title); font-weight:var(--title-weight);
  font-size:var(--fs-h1); line-height:var(--lh-tight); color:var(--text);
  display:flex; align-items:center; gap:5px;
}
.floor-title .dot{ width:5px; height:5px; border-radius:50%; background:var(--brand); }
.floor-more{ font-size:var(--fs-cap); color:var(--text-muted); display:flex; align-items:center; gap:2px; }

/* ---------- 横滑容器 ---------- */
.hscroll{
  display:flex; gap:var(--sp-3); overflow-x:auto; padding:3px var(--sp-4) var(--sp-2);
  scroll-snap-type:x proximity; scroll-padding-left:var(--sp-4);
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.hscroll::-webkit-scrollbar{ display:none; }
.hscroll > *{ scroll-snap-align:start; flex:0 0 auto; }

/* ---------- 卡面 ---------- */
.card{
  background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow);
}
[data-tier="premium"] .card{ box-shadow:var(--shadow), var(--gold-glow); }

/* ---------- 按钮 ---------- */
.btn{
  background:var(--brand); color:#fff; font-weight:700; font-size:13.5px;
  border-radius:999px; padding:8px 16px;
  transition:transform var(--t-fast), filter var(--t-fast);
}
[data-tier="premium"] .btn{ color:#1A1505; }
.btn:active{ transform:scale(.96); filter:brightness(1.05); }
.btn-ghost{
  background:transparent; border:1.5px solid var(--brand); color:var(--brand);
  font-weight:700; border-radius:999px; padding:6px 14px;
}
.btn-block{ width:100%; text-align:center; }

/* ---------- 价格 ---------- */
.price{ color:var(--price-color); font-weight:800; font-size:var(--fs-price); }
.price .cur{ font-size:12px; }
.price-origin{ color:var(--text-muted); text-decoration:line-through; font-size:11.5px; margin-left:4px; }

/* ---------- 标签 ---------- */
.tag{
  display:inline-flex; align-items:center; gap:2px; font-size:10.5px; font-weight:600;
  padding:1.5px 5px; border-radius:5px; background:var(--brand-soft); color:var(--brand-strong);
}
[data-identity="event"][data-tier="value"] .tag{ color:var(--text); }
.badge-disc{
  background:linear-gradient(135deg,#F04060,#DC1850); color:#fff; font-weight:800;
  font-size:10.5px; padding:1.5px 5px; border-radius:5px;
}

/* ---------- 图片占位 ---------- */
.ph{
  position:relative; overflow:hidden; background:#d9d9de;
  display:flex; align-items:flex-end; color:#fff;
}
.ph::after{
  content:attr(data-label); position:absolute; left:7px; bottom:5px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10px;
  color:rgba(255,255,255,.9); text-shadow:0 1px 3px rgba(0,0,0,.5);
}
</style>
<style id="marketing-color-refresh">

/* ===== Feeds 实时中插：滴进视野那一刻才「弹入」（JS 加 .reco-in 触发），仅 opacity/transform，不重排不抖动 ===== */
/* ===== Feeds 实时中插：滚进视野时高度从 0 平滑「展开插入」，下方卡片顺势下移；WAAPI 驱动 height，兼容可靠 ===== */
/* ===== Feeds 实时中插：滚进视野时高度从 0 平滑展开插入（命令式 height 过渡，所有浏览器可见） ===== */
.reco-insert{
  height:0;
  overflow:hidden;
}
/* 中插内的横滑行关闭 scroll-snap：高度展开时吸附会反复重算并横向微调，导致卡片左右抖动 */

}

  .reco-live-dot{ animation:none; }
}

  --ranking-grad:linear-gradient(135deg,#F6F4EE 0%,#DAD3BE 55%,#BCB392 100%) !important;
  --marketing-glow:0 14px 34px rgba(142,124,78,.14) !important;
  --btn-shadow:0 8px 20px rgba(142,124,78,.22), inset 0 1px 0 rgba(255,255,255,.55) !important;
  --shadow:0 1px 4px rgba(80,72,44,.06), 0 12px 28px rgba(90,82,52,.10) !important;
}
[data-tier="premium"] #channel{
  background:
    radial-gradient(120% 50% at 50% -8%, rgba(217,209,182,.5), transparent 60%),
    linear-gradient(180deg,#F7F6F0,var(--bg)) !important;
}
/* 优惠券：象牙底 + 金色票根，替换原黑金底 */
[data-tier="premium"] [data-mod="coupon"] .floor-head + div{
  background:var(--promo-bg) !important;
  border-color:color-mix(in srgb,var(--brand) 22%, transparent) !important;
}
[data-tier="premium"] [data-mod="coupon"] .card.coupon-ticket{
  background:var(--surface) !important;
  border:1px solid color-mix(in srgb,var(--brand) 26%, transparent) !important;
}
[data-tier="premium"] [data-mod="coupon"] .card.coupon-ticket > div:last-child{
  background:var(--surface) !important;
}
[data-tier="premium"] [data-mod="coupon"] .card.coupon-ticket > div:first-child > div[style*="border-right"]{
  border-right-color:rgba(255,255,255,.55) !important;
}
/* 标签 / 次按钮：浅金质感 */
[data-tier="premium"] .tag{
  background:color-mix(in srgb,var(--brand-soft) 90%, #fff 10%) !important;
  color:var(--brand-strong) !important;
  border:1px solid color-mix(in srgb,var(--brand) 22%, transparent) !important;
}
[data-tier="premium"] .btn-ghost,
[data-tier="premium"] button.btn-ghost{
  background:color-mix(in srgb,var(--brand-soft) 70%, #fff 30%) !important;
  color:var(--brand-strong) !important;
  border:1px solid color-mix(in srgb,var(--brand) 34%, transparent) !important;
}
</style>

<style id="v22-premium-coupon-harmonize">
/* v22：高端模式优惠券 —— 去掉深色底图，与明亮香槟金主题统一，象牙卡 + 金色票根 */
[data-tier="premium"] [data-mod="coupon"] .floor-head + div{
  background:transparent !important;
  border:0 !important;
  border-radius:0 !important;
  padding:2px 0 4px !important;
  margin:0 14px 2px !important;
  box-shadow:none !important;
}
[data-tier="premium"] [data-mod="coupon"] .card.coupon-ticket{
  background:var(--surface) !important;
  border:1px solid color-mix(in srgb,var(--brand) 24%, transparent) !important;
  box-shadow:0 4px 14px rgba(120,96,40,.10) !important;
}
[data-tier="premium"] [data-mod="coupon"] .card.coupon-ticket > div:last-child{
  background:var(--surface) !important;
}
/* 票根缺口贴合页面底色 */
[data-tier="premium"] [data-mod="coupon"] .card.coupon-ticket > div:first-child > span:nth-of-type(2),
[data-tier="premium"] [data-mod="coupon"] .card.coupon-ticket > div:first-child > span:nth-of-type(3){
  background:var(--bg) !important;
}
<style id="v23-premium-coupon-clean">
/* v23：高端模式优惠券模块清理
   容器：去掉深色底图（透明、无边框）
   优惠券：去掉浅色描边
   业务线分组 tab 行：不加底图，保持页面背景透传
   返回顶部按钮：全局重置为纯箭头（去掉圆形边框/渐变底色） */

/* 容器去底图：用高优先级同类选择器覆盖旧版 !important 规则 */
[data-tier="premium"] [data-mod="coupon"] > .floor > div:nth-of-type(2),
[data-tier="premium"] [data-mod="coupon"] section > div:nth-of-type(2),
[data-tier="premium"] [data-mod="coupon"] .floor-head + div{
  background:transparent !important;
  background-image:none !important;
  border:0 !important;
  border-radius:0 !important;
  box-shadow:none !important;
  margin:0 14px 2px !important;
  padding:2px 0 4px !important;
}
/* 业务线分组 tab 行：透明，不加任何底图；与下方优惠券留出安全距离 */
[data-tier="premium"] [data-mod="coupon"] .floor-head + div > div:first-child{
  background:transparent !important;
  background-image:none !important;
  border:0 !important;
  border-radius:0 !important;
  box-shadow:none !important;
  padding:0 !important;
  margin-bottom:8px !important;
}
/* 优惠券去浅色描边 */
[data-tier="premium"] [data-mod="coupon"] .card.coupon-ticket{
  border:0 !important;
  box-shadow:0 4px 14px rgba(120,96,40,.10) !important;
}
/* 返回顶部按钮：全局重置为纯透明箭头 */
[aria-label="返回顶部"],
[data-tier="premium"] [aria-label="返回顶部"],
[data-tier="value"] [aria-label="返回顶部"]{
  background:transparent !important;
  background-image:none !important;
  border:none !important;
  box-shadow:none !important;
}
</style>

<style id="uniform-component-spacing">
/* ============================================================
   统一组件间距：所有人群页面、所有模块的纵向间距完全一致并略微拉宽
   - 模块与模块之间：固定 18px
   - 模块标题(floor-head)：固定 上16 / 下8，覆盖 coupon/feeds 等个别收紧
   这样切换任何身份/档位，组件之间的呼吸感都保持一样
   ============================================================ */
#channel > [data-mod]{ margin-bottom:18px !important; }
#channel > [data-mod]:last-child{ margin-bottom:24px !important; }

.floor-head,
[data-mod] .floor-head,
[data-mod="coupon"] .floor-head,
[data-mod="feeds"] .floor-head,
[data-mod="ranking"] .floor-head{
  margin-top:16px !important;
  margin-bottom:8px !important;
}
</style>

<style id="hscroll-card-shadow-fix">
/* ============================================================
   横滑卡片去“投影连成横线”：一排卡片向下的投影会糊成一条横带，
   看着像下方模块顶部有条线。改用 1px 细描边（被卡片间距打断，不连成线），
   只作用于性价比浅色皮肤（深色高端皮肤本就没有白底横带问题）。
   覆盖：榜单 / 帖子 / 积分酒店 / 目的地详情的横滑行 等所有 .hscroll 内卡片。
   ============================================================ */
[data-tier="value"] .hscroll .card{
  box-shadow:0 0 0 1px rgba(26,24,33,.06) !important;
}
/* Feeds 瀑布流：竖向双列，保留极轻投影即可，去掉重的向下投影 */
[data-tier="value"] [data-mod="feeds"] .card{
  box-shadow:0 1px 3px rgba(26,24,33,.05) !important;
}
</style>
</head>

<style id="v14-coupon-redesign">
/* ============================================================
   v14 优惠券票面重设：极简描边 + SVG 票形轮廓 + 真实齿孔
   左：大号金额/折扣；右：卖点标题（2行打点）+ 原样式按钮（居右居中）
   ============================================================ */
.cpx-row{ padding-bottom:4px !important; }
.cpx-tk{ flex:0 0 250px; position:relative; display:flex; height:88px; }
.cpx-fill{ position:absolute; inset:0; background:var(--surface); border-radius:14px;
  -webkit-mask:radial-gradient(circle 7px at 84px 0,transparent 6.8px,#000 7.4px),radial-gradient(circle 7px at 84px 100%,transparent 6.8px,#000 7.4px);
  -webkit-mask-composite:source-in;
  mask:radial-gradient(circle 7px at 84px 0,transparent 6.8px,#000 7.4px),radial-gradient(circle 7px at 84px 100%,transparent 6.8px,#000 7.4px);
  mask-composite:intersect; }
.cpx-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; shape-rendering:geometricPrecision; }
.cpx-edge{ fill:none; stroke:color-mix(in srgb,var(--brand) 32%, transparent); stroke-width:1; vector-effect:non-scaling-stroke; }
.cpx-dash{ fill:none; stroke:color-mix(in srgb,var(--price-color,var(--brand)) 42%, transparent); stroke-width:1.2; stroke-dasharray:3 3.5; stroke-linecap:round; vector-effect:non-scaling-stroke; }
.cpx-amt{ position:relative; z-index:1; flex:0 0 84px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:0 4px; }
.cpx-big{ font-size:26px; font-weight:900; color:var(--price-color,var(--brand)); line-height:1; letter-spacing:-.5px; white-space:nowrap; }
.cpx-cur{ font-size:.56em; font-weight:800; margin-right:1px; vertical-align:1.5px; }
.cpx-unit{ font-size:.62em; font-weight:800; margin-left:1px; }
.cpx-thr{ font-size:11px; color:var(--price-color,var(--brand)); opacity:.82; }
.cpx-main{ position:relative; z-index:1; flex:1; min-width:0; display:flex; align-items:center; gap:9px; padding:0 11px 0 14px; }
.cpx-ttl{ flex:1; min-width:0; font-size:14px; font-weight:800; color:var(--text); line-height:1.28;
  display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
[data-mod="coupon"] .cpx-main .btn,
[data-mod="coupon"] .cpx-main .btn-ghost{ min-width:48px; box-shadow:none !important; }
</style>

<style id="v14-rebate-cta-clean">
/* Trip Coins 返赠主 CTA：去掉半透明白描边造成的边缘重影，统一为干净的实色按钮 */
[data-mod="coinsRebate"] button.btn.rebate-cta{
  border:0 !important;
  outline:none !important;
  background-clip:padding-box !important;
  box-shadow:0 6px 16px rgba(26,24,33,.14) !important;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}
</style>

<style id="v19-ranking-shadow-fix">
/* 尊享臻选榜：
   - 去掉过大的多层光晕（看着像卡片背后多了一块底图、底部还有一条明显的线）；
   - 四边统一为一条干净清晰的细边框，并贴合卡片加一层极轻阴影，
     避免边缘重影、粗细不一，也避免「展开」按钮下方出现阴影底带。 */
[data-mod="ranking"] .card,
[data-tier="premium"] [data-mod="ranking"] .card{
  border:1px solid var(--hairline) !important;
  box-shadow:0 1px 3px rgba(40,34,20,.06) !important;
}
</style>
